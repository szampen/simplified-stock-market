services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: stock_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d stock_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app1:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stock_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/stocks || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  app2:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stock_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/stocks || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${EXTERNAL_PORT:-8080}:80"
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy